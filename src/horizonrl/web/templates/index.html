<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon-Agent 溯证智搜 · 多 Agent 协同研究</title>
<link rel="stylesheet" href="/static/css/style.css?v={{ app_version }}">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230a0e14'/><text x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='17' fill='%2358a6ff'>H</text></svg>">
</head>
<body>
<div id="root">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-head"><h2>加载中...</h2><div class="sb-dot live"></div></div>
      <div class="sidebar-panel" style="flex:1;display:flex;align-items:center;justify-content:center">
        <div style="text-align:center;color:var(--text-muted)">
          <div class="skel" style="width:200px;height:14px;margin:0 auto 8px"></div>
          <div class="skel" style="width:140px;height:14px;margin:0 auto 8px"></div>
          <div class="skel" style="width:180px;height:14px;margin:0 auto"></div>
        </div>
      </div>
    </aside>
    <div class="main-area">
      <header class="header">
        <div class="header-brand"><div class="hb-icon">V</div><h1>Horizon-Agent</h1></div>
        <div class="badge badge-idle">加载中</div>
      </header>
      <div class="msg-area" style="flex:1;display:flex;align-items:center;justify-content:center">
        <div style="text-align:center">
          <div class="spinner" style="margin:0 auto 12px;width:24px;height:24px"></div>
          <p style="font-size:13px;color:var(--text-secondary)">正在加载应用...</p>
          <p style="font-size:10px;color:var(--text-muted);margin-top:4px" id="diagMsg">React 18 + htm</p>
        </div>
      </div>
      <div class="input-bar"><div class="input-row"><input readonly disabled placeholder="应用加载中..."></div></div>
    </div>
    <aside class="detail">
      <div class="sec"><h3>会话统计</h3></div>
    </aside>
  </div>
</div>
<script>window.APP_VERSION='{{ app_version }}';</script>
<script>
window.__LOAD_LOG = [];
function logLoad(name, ok) {
  window.__LOAD_LOG.push({name:name, ok:ok, ts:Date.now()});
  var el = document.getElementById('diagMsg');
  if (el) el.textContent = (ok ? 'OK' : 'FAIL') + ': ' + name;
}
</script>
<script src="/static/js/vendor/react.production.min.js?v={{ app_version }}" onload="logLoad('react',true)" onerror="logLoad('react',false)"></script>
<script src="/static/js/vendor/react-dom.production.min.js?v={{ app_version }}" onload="logLoad('react-dom',true)" onerror="logLoad('react-dom',false)"></script>
<script src="/static/js/vendor/htm.min.js?v={{ app_version }}" onload="logLoad('htm',true)" onerror="logLoad('htm',false)"></script>
<script src="/static/js/vendor/marked.min.js?v={{ app_version }}" onload="logLoad('marked',true)" onerror="logLoad('marked',false)"></script>
<script src="/static/js/app.js?v={{ app_version }}" onload="logLoad('app',true)" onerror="logLoad('app',false)"></script>
</body>
</html>
