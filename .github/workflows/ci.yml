name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test Matrix ─────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libopenblas-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov chromadb

      - name: Verify core imports
        env:
          SESSION_BACKEND: memory
        run: |
          python -c "from horizonrl.schemas.task import TaskSpec, PlanGraph, PlanNode, PlanPatch"
          python -c "from horizonrl.schemas.result import StepResult, VerificationResult, EvidenceItem"
          python -c "from horizonrl.schemas.event import TrajectoryEvent, TrajectorySession, EventType"
          python -c "from horizonrl.schemas.report import FinalReport, ReportSection, CitationMap"
          python -c "from horizonrl.config.settings import load_config, RootConfig, MemoryConfig"
          python -c "from horizonrl.llm.client import LLMClient, LLMCallResult"
          python -c "from horizonrl.agent.planner import Planner, LLMPlanner"
          python -c "from horizonrl.agent.worker import AgentWorker"
          python -c "from horizonrl.agent.verifier import Verifier, RuleEngine"
          python -c "from horizonrl.agent.replanner import Replanner"
          python -c "from horizonrl.agent.writer import Writer, WriterConfig"
          python -c "from horizonrl.tools.manager import ToolManager"
          python -c "from horizonrl.tools.web_search import WebSearchTool"
          python -c "from horizonrl.tools.paper_search import PaperSearchTool"
          python -c "from horizonrl.tools.code_execution import CodeExecutionTool"
          python -c "from horizonrl.tools.mock import MockWebSearch, MockPaperSearch"
          python -c "from horizonrl.memory.hierarchical_memory import HierarchicalMemory, L3EpisodicArchive"
          python -c "from horizonrl.memory.vector_store import ChromaVectorStore"
          python -c "from horizonrl.orchestration.dag_workflow import ResearchOrchestrator"
          python -c "from horizonrl.services.research_service import run_research_session"
          python -c "from horizonrl.logging.trajectory_logger import TrajectoryLogger"
          python -c "from horizonrl.web.app import create_app"
          python -c "from horizonrl.web.session_manager import SessionManager, SqliteSessionManager"
          echo "All core imports OK"

      - name: Run tests
        env:
          SESSION_BACKEND: memory
        run: |
          python -m pytest tests/ --ignore=tests/manual -v --tb=short

  # ── Lint ────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/ --ignore=E501

  # ── Benchmark Smoke ─────────────────────────────────────────────────────
  benchmark:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run benchmark smoke (2 tasks)
        env:
          SESSION_BACKEND: memory
        run: |
          python examples/07_benchmark.py --category 事实知识 --rounds 1
