name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libopenblas-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov

      - name: Verify core imports
        env:
          HORIZON_SEARCH_PROVIDER: mock
          HORIZON_OFFLINE_MODE: "true"
        run: |
          python -c "from horizonrl.orchestration.dag_workflow import ResearchOrchestrator"
          python -c "from horizonrl.memory.hierarchical_memory import L3EpisodicArchive"
          python -c "from horizonrl.llm.client import LLMClient, EmbedResult"
          python -c "from horizonrl.agent.planner import Planner, _build_plan_graph"
          python -c "from horizonrl.agent.writer import Writer"

      - name: Run tests (mock mode)
        env:
          HORIZON_SEARCH_PROVIDER: mock
          HORIZON_OFFLINE_MODE: "true"
          ENABLE_LLM_WRITER: "false"
        run: |
          python -m pytest tests/ -v --tb=short

  # Python 3.13 实验性支持（允许失败）
  test-python313:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libopenblas-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests (mock mode)
        env:
          HORIZON_SEARCH_PROVIDER: mock
          HORIZON_OFFLINE_MODE: "true"
          ENABLE_LLM_WRITER: "false"
        run: |
          python -m pytest tests/ -v --tb=short
